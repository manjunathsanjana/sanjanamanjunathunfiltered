<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Food stories by Sanjana Unfiltered — recipes, reviews, street food adventures, and everything delicious." />
  <title>Food — Sanjana Unfiltered</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- ─── Navbar ───────────────────────────────────────── -->
  <nav class="navbar scrolled" id="navbar">
    <div class="container">
      <a href="index.html" class="navbar__logo" aria-label="Go back to home">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
          style="margin-right: 8px; vertical-align: middle;">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        sanjanaunfiltered
      </a>

    </div>
  </nav>

  <!-- ─── Page Hero ────────────────────────────────────── -->
  <section class="page-hero">
    <div class="container">
      <span class="hero__tag">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8zM6 1v3M10 1v3M14 1v3" />
        </svg>
        Category
      </span>
      <h1 class="page-hero__title">Food</h1>
      <p class="page-hero__desc">Recipes, street food escapades, honest reviews, and the cravings that keep me going.
      </p>
    </div>
  </section>

  <!-- ─── Posts List ───────────────────────────────────── -->
  <section class="posts-list-section">
    <div class="container">

      <!-- ─── Pagination ───────────────────────────────────── -->
      <div class="pagination" id="food-pagination">
        <button class="pagination__btn" aria-label="Previous page">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
            stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
          </svg>
        </button>
        <button class="pagination__btn active">1</button>
        <button class="pagination__btn">2</button>
        <button class="pagination__btn">3</button>
        <button class="pagination__btn" aria-label="Next page">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
            stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
          </svg>
        </button>
      </div>

      <div class="posts-list">

        <a href="post.html?post=Yuki.md" class="post-list-item reveal" id="food-post-1">
          <div class="post-list-item__main">
            <img src="photos/yukientrance.jpeg" alt="Thumbnail" class="post-list-item__image" />
            <h2 class="post-list-item__title">Sweet Escapes in Indiranagar: A Review of Yuki</h2>
          </div>
          <div class="post-list-item__meta">
            <span class="post-list-item__date">Mar 28, 2026</span>
          </div>
        </a>

      </div>
    </div>

  <script src="script.js"></script>
