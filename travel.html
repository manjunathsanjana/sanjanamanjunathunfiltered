<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Travel stories by Sanjana Unfiltered — wanderlust chronicles, hidden gems, and journeys that shaped me." />
  <title>Travel — Sanjana Unfiltered</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- ─── Navbar ───────────────────────────────────────── -->
  <nav class="navbar scrolled" id="navbar">
    <div class="container">
      <a href="index.html" class="navbar__logo">sanjanaunfiltered</a>

    </div>
  </nav>

  <!-- ─── Page Hero ────────────────────────────────────── -->
  <section class="page-hero">
    <div class="container">
      <span class="hero__tag">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 2L11 13" />
          <path d="M22 2l-7 20-4-9-9-4 20-7z" />
        </svg>
        Category
      </span>
      <h1 class="page-hero__title">Travel</h1>
      <p class="page-hero__desc">Mountains, coastlines, hidden villages, and the beautiful chaos of being somewhere new.
      </p>
    </div>
  </section>

  <!-- ─── Posts List ───────────────────────────────────── -->
  <section class="posts-list-section">
    <div class="container">

      <!-- ─── Pagination ───────────────────────────────────── -->
      <div class="pagination" id="travel-pagination">
        <button class="pagination__btn" aria-label="Previous page">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
            stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
          </svg>
        </button>
        <button class="pagination__btn active">1</button>
        <button class="pagination__btn">2</button>
        <button class="pagination__btn">3</button>
        <button class="pagination__btn" aria-label="Next page">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
            stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
          </svg>
        </button>
      </div>

      <div class="posts-list">

        <a href="#" class="post-list-item reveal" id="travel-post-1">
          <div class="post-list-item__main">
            <img src="images/category-travel.png" alt="Thumbnail" class="post-list-item__image" />
            <h2 class="post-list-item__title">Sunrise at 14,000 Feet — Was It Worth the Trek?</h2>
          </div>
          <div class="post-list-item__meta">
            <span class="post-list-item__date">Mar 15, 2026</span>
          </div>
        </a>

      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>

</html>
